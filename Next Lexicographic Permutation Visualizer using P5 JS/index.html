<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lexicographic Permutation Visualizer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
  <script src="lexico_algo.js"></script>
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #controls {
      margin-top: 20px;
      background: #222;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px #0ff;
      text-align: center;
    }

    input, button {
      font-size: 16px;
      margin: 8px;
      padding: 5px 10px;
    }

    span {
      margin-left: 10px;
      color: #0ff;
    }
  </style>
</head>
<body>
  <div id="controls">
    <div>
      <input id="inputN" type="text" value="3" size="4">
      <span>N (2 ≤ N ≤ 8)</span>
    </div>
    <div>
      <input id="inputP" type="text" value="1 3 2" size="20">
      <span>Enter P[]</span>
    </div>
    <div>
      <input id="inputQ" type="text" value="3 1 2" size="20">
      <span>Enter Q[]</span>
    </div>
    <div>
      <button id="startBtn">Start Visualization</button>
      <button id="nextBtn" style="display:none;">Next Step ➡️</button>
    </div>
  </div>
</body>
</html>
